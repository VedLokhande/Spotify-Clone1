<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <ul>
            <li class="brand"><img src="/Images/download.gif" alt="Spotify Logo" height="50"></li>
            <li>WELCOME TO SPOTIFY CLONE </li>
        </ul>
    </nav>

    <div class="container">
        <h1>Best Of 2026</h1>
        <div class="songlist">
            <div class="song">
                <img src="Images/9d06855287d0a499835ca1453317d6ec.1000x1000x1.jpg" alt="Song 1" height="40px">
                <span>Billie Jean<span class="timespan"><i class="fa-solid fa-circle-play fa-2x songPlay" data-index="0"></i></span></span>
                <span> 4:54</span>
            </div>
        </div>

        <div class="songlist">
            <div class="song">
                <img src="Images/artworks-nyKCzCw1tSPB-0-t1080x1080.jpg" alt="Song 1" height="40px">
                <span>I thought I saw your face today<span class="timespan">
                    <i class="fa-solid fa-circle-play fa-2x songPlay" data-index="1"></i></span></span>
                <span> 2:50</span>
            </div>
        </div>
        <div class="songlist">
            <div class="song">
                <img src="Images/Beat_It.jpg" alt="Song 1" height="40px">
                <span>Beat It<span class="timespan"><i class="fa-solid fa-circle-play fa-2x songPlay" data-index="2"></i></span></span>
                <span> 4:18</span>
            </div>
        </div>
        <div class="songlist">
            <div class="song">
                <img src="Images/maxresdefault.jpg" alt="Song 1" height="40px">
                <span>Chicago<span class="timespan"><i class="fa-solid fa-circle-play fa-2x songPlay" data-index="3"></i></span></span>
                <span> 4:05</span>
            </div>
        </div>
        <div class="songlist">
            <div class="song">
                <img src="Images/94usevm6tlc41.png" alt="Song 1" height="40px">
                <span>Blinding Lights<span class="timespan"><i class="fa-solid fa-circle-play fa-2x songPlay" data-index="4"></i></span></span>
                <span> 4:54</span>
            </div>
        </div>
        <div class="songlist">
            <div class="song">
                <img src="Images/R-9882982-1569769665-6597.jpg" alt="Song 1" height="40px">
                <span>Shape Of You<span class="timespan"><i class="fa-solid fa-circle-play fa-2x songPlay" data-index="5"></i></span></span>
                <span> 3:53</span>
            </div>
        </div>
        <div class="songbanner"></div>
    </div>

    <div class="bottom">
        <input type="range" id="myprogressbar" min="0" max="100">

        <div class="icons">
            <i class="fa-solid fa-backward-step fa-3x" id="previous"></i>
            <i class="fa-solid fa-circle-play fa-3x" id="masterPlay"></i>
            <i class="fa-solid fa-forward-step fa-3x" id="next"></i>
        </div>
        <div class="songplaying">
            <span>Billie Jean</span>
        </div>
    </div>

        <script src="script.js"></script>
</body>

</html>
